name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests (mock mode)
        env:
          MOCK_MODE: "true"
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: pe-dd-backend
          region: us-central1
          source: ./backend
          timeout: 900
          flags: --memory=1Gi --cpu=2 --concurrency=10
          env_vars: |
            GCP_PROJECT_ID=pe-dd-demo-03312257
            GCP_BUCKET_NAME=pe-dd-demo-03312257-reports
            GEMINI_RESEARCH_MODEL=gemini-2.5-pro
            PRESENTON_URL=${{ secrets.PRESENTON_URL }}
            MOCK_MODE=false
          secrets: |
            GEMINI_API_KEY=gemini-api-key:latest
